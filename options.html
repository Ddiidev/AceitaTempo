<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AceitaTempo</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div class="eyebrow" data-i18n="optionsEyebrow"></div>
        <h1 data-i18n="optionsTitle"></h1>
        <p data-i18n="optionsSubtitle"></p>
      </section>

      <section class="card">
        <form id="settingsForm" class="form">
          <div class="grid">
            <label class="field field-wide toggle-field">
              <span class="toggle-copy">
                <span class="toggle-title" data-i18n="wageModeLabel"></span>
              </span>
              <span class="wage-mode-switch">
                <span data-i18n="wageModeFixed"></span>
                <span class="switch">
                  <input id="wageMode" name="wageMode" type="checkbox" />
                  <span class="switch-track" aria-hidden="true"></span>
                </span>
                <span data-i18n="wageModeHourly"></span>
              </span>
            </label>

            <label class="field">
              <span data-i18n="salaryLabel"></span>
              <input id="salaryAmount" name="salaryAmount" type="number" min="0" step="0.01" inputmode="decimal" />
            </label>

            <label class="field">
              <span data-i18n="salaryPeriodLabel"></span>
              <select id="salaryPeriod" name="salaryPeriod">
                <option value="monthly" data-i18n="salaryPeriodMonthly"></option>
                <option value="biweekly" data-i18n="salaryPeriodBiweekly"></option>
                <option value="weekly" data-i18n="salaryPeriodWeekly"></option>
                <option value="daily" data-i18n="salaryPeriodDaily"></option>
              </select>
            </label>

            <label class="field">
              <span data-i18n="salaryCurrencyLabel"></span>
              <select id="salaryCurrency" name="salaryCurrency">
                <option value="BRL">BRL</option>
                <option value="USD">USD</option>
              </select>
            </label>

            <label class="field">
              <span data-i18n="periodHoursLabel"></span>
              <input id="monthlyHours" name="monthlyHours" type="number" min="1" step="1" inputmode="numeric" />
            </label>

            <label class="field">
              <span data-i18n="timeDisplayModeLabel"></span>
              <select id="timeDisplayMode" name="timeDisplayMode">
                <option value="hours" data-i18n="timeDisplayModeHours"></option>
                <option value="period" data-i18n="timeDisplayModePeriod"></option>
              </select>
            </label>

            <div id="hourlyRateGroup" class="field" style="display: none;">
              <span data-i18n="hourlyRateLabel"></span>
              <div class="input-with-affixes">
                <span id="hourlyRateCurrencyPrefix" class="input-prefix">R$</span>
                <input id="hourlyRate" name="hourlyRate" type="number" min="0" step="0.01" inputmode="decimal" />
                <span class="input-suffix" data-i18n="perHourSuffix"></span>
              </div>
            </div>

            <label class="field field-wide toggle-field">
              <span class="toggle-copy">
                <span class="toggle-title" data-i18n="extendedTimeDisplayLabel"></span>
                <span class="toggle-desc" data-i18n="extendedTimeDisplayHint"></span>
              </span>
              <span class="switch">
                <input id="extendedTimeDisplay" name="extendedTimeDisplay" type="checkbox" />
                <span class="switch-track" aria-hidden="true"></span>
              </span>
            </label>

            <label id="extendedTimeDayModeGroup" class="field field-wide">
              <span data-i18n="extendedTimeDayModeLabel"></span>
              <select id="extendedTimeDayMode" name="extendedTimeDayMode">
                <option value="calendar" data-i18n="extendedTimeDayModeCalendar"></option>
                <option value="working" data-i18n="extendedTimeDayModeWorking"></option>
              </select>
            </label>

            <label class="field field-wide toggle-field">
              <span class="toggle-copy">
                <span class="toggle-title" data-i18n="replacePricesWithHoursLabel"></span>
                <span class="toggle-desc" data-i18n="replacePricesWithHoursHint"></span>
              </span>
              <span class="switch">
                <input id="replacePricesWithHours" name="replacePricesWithHours" type="checkbox" />
                <span class="switch-track" aria-hidden="true"></span>
              </span>
            </label>

            <label class="field field-wide toggle-field">
              <span class="toggle-copy">
                <span class="toggle-title">
                  <span data-i18n="enableExternalSitesLabel"></span>
                  <span class="wip-badge" data-i18n="enableExternalSitesWip"></span>
                </span>
                <span class="toggle-desc" data-i18n="enableExternalSitesHint"></span>
              </span>
              <span class="switch">
                <input id="enableExternalSites" name="enableExternalSites" type="checkbox" disabled />
                <span class="switch-track" aria-hidden="true"></span>
              </span>
            </label>

            <section class="settings-section field-wide" aria-labelledby="socialAwarenessSectionTitle">
              <div class="settings-section__header">
                <h2 id="socialAwarenessSectionTitle" data-i18n="socialAwarenessSectionTitle"></h2>
                <p data-i18n="socialAwarenessSectionHint"></p>
              </div>

              <label class="field field-wide toggle-field">
                <span class="toggle-copy">
                  <span class="toggle-title" data-i18n="socialAwarenessEnabledLabel"></span>
                  <span class="toggle-desc" data-i18n="socialAwarenessEnabledHint"></span>
                </span>
                <span class="switch">
                  <input id="socialAwarenessEnabled" name="socialAwarenessEnabled" type="checkbox" />
                  <span class="switch-track" aria-hidden="true"></span>
                </span>
              </label>

              <div id="socialAwarenessControls" class="settings-section__body" hidden>
                <div class="field field-wide">
                  <span data-i18n="socialAwarenessSitesLabel"></span>
                  <p class="inline-hint" data-i18n="socialAwarenessSitesHint"></p>
                  <div id="socialAwarenessSiteToggles" class="site-grid site-grid--compact"></div>
                </div>

                <label class="field field-wide toggle-field">
                  <span class="toggle-copy">
                    <span class="toggle-title" data-i18n="socialPromptEnabledLabel"></span>
                    <span class="toggle-desc" data-i18n="socialPromptEnabledHint"></span>
                  </span>
                  <span class="switch">
                    <input id="socialPromptEnabled" name="socialPromptEnabled" type="checkbox" />
                    <span class="switch-track" aria-hidden="true"></span>
                  </span>
                </label>

                <label class="field field-wide toggle-field">
                  <span class="toggle-copy">
                    <span class="toggle-title" data-i18n="socialTrackingEnabledLabel"></span>
                    <span class="toggle-desc" data-i18n="socialTrackingEnabledHint"></span>
                  </span>
                  <span class="switch">
                    <input id="socialTrackingEnabled" name="socialTrackingEnabled" type="checkbox" />
                    <span class="switch-track" aria-hidden="true"></span>
                  </span>
                </label>

                <label class="field field-wide toggle-field">
                  <span class="toggle-copy">
                    <span class="toggle-title" data-i18n="socialReflectionEnabledLabel"></span>
                    <span class="toggle-desc" data-i18n="socialReflectionEnabledHint"></span>
                  </span>
                  <span class="switch">
                    <input id="socialReflectionEnabled" name="socialReflectionEnabled" type="checkbox" />
                    <span class="switch-track" aria-hidden="true"></span>
                  </span>
                </label>

                <label class="field field-wide toggle-field">
                  <span class="toggle-copy">
                    <span class="toggle-title" data-i18n="socialMonetaryOptInLabel"></span>
                    <span class="toggle-desc" data-i18n="socialMonetaryOptInHint"></span>
                  </span>
                  <span class="switch">
                    <input id="socialMonetaryOptIn" name="socialMonetaryOptIn" type="checkbox" />
                    <span class="switch-track" aria-hidden="true"></span>
                  </span>
                </label>
              </div>
            </section>

            <label class="field">
              <span data-i18n="exchangeModeLabel"></span>
              <select id="exchangeRateMode" name="exchangeRateMode">
                <option value="auto" data-i18n="exchangeModeAuto"></option>
                <option value="manual" data-i18n="exchangeModeManual"></option>
              </select>
            </label>

            <label class="field field-wide">
              <span data-i18n="manualRateLabel"></span>
              <input
                id="manualUsdToBrlRate"
                name="manualUsdToBrlRate"
                type="number"
                min="0"
                step="0.0001"
                inputmode="decimal"
              />
            </label>
          </div>

          <p class="hint" data-i18n="manualRateHint"></p>
          <p id="rateSnapshot" class="hint hint-strong"></p>

          <section class="site-block">
            <div class="site-block__header">
              <h2 data-i18n="siteBlockTitle"></h2>
              <p data-i18n="siteBlockHint"></p>
            </div>
            <div id="siteBlockBody" class="site-block__body is-collapsed">
              <div id="siteToggles" class="site-grid"></div>
            </div>
            <button type="button" id="siteBlockToggle" class="site-block__toggle" data-i18n="siteBlockShowMore"></button>
          </section>

          <div class="actions">
            <button type="submit" class="primary" data-i18n="saveButton"></button>
            <button type="button" id="resetButton" class="secondary" data-i18n="resetButton"></button>
          </div>

          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="src/site-config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
