<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AceitaTempo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="card hero">
        <div class="eyebrow" data-i18n="popupEyebrow"></div>
        <h1 data-i18n="popupTitle"></h1>
        <p data-i18n="popupSubtitle"></p>
      </section>

      <section class="card summary">
        <div id="socialCounterCard" class="social-counter" hidden>
          <div class="eyebrow social-counter__eyebrow" data-i18n="popupSocialEyebrow"></div>
          <div class="social-counter__row">
            <div>
              <strong id="socialSiteName">-</strong>
              <p id="socialCounterHint" data-i18n="popupSocialHint"></p>
            </div>
            <div class="social-counter__time" id="socialActiveTime">-</div>
          </div>
        </div>
        <div id="salaryRow" class="summary-row">
          <span data-i18n="salaryLabel"></span>
          <strong id="salaryValue">-</strong>
        </div>
        <div id="hoursRow" class="summary-row">
          <span data-i18n="monthlyHoursLabel"></span>
          <strong id="hoursValue">-</strong>
        </div>
        <div class="summary-row">
          <span data-i18n="hourlyValueLabel"></span>
          <strong id="hourlyValue">-</strong>
        </div>
        <div class="summary-row">
          <span data-i18n="exchangeModeLabel"></span>
          <strong id="exchangeValue">-</strong>
        </div>
      </section>

      <section class="card calculator-card">
        <div class="eyebrow" data-i18n="calculatorEyebrow"></div>
        <div class="calculator-input-row">
          <span class="calculator-currency" id="calcCurrency">R$</span>
          <input type="text" id="calcInput" data-i18n-placeholder="calculatorPlaceholder" />
        </div>
        <div class="calculator-result" id="calcResult" hidden>
          <div class="calculator-result-time" id="calcTime"></div>
          <div class="calculator-result-suffix" data-i18n="calculatorWorkSuffix"></div>
        </div>
      </section>

      <section class="card action-card">
        <button id="openOptions" class="primary" type="button" data-i18n="openOptionsButton"></button>
      </section>
    </main>

    <script src="src/site-config.js"></script>
    <script src="src/price-utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
